# Application Configuration
# This file contains configuration settings for the application, including logging configuration

rag_chat:
  db_connection_secret_name: "rag-chat-db-connection"
  memory:
    backend: "postgres"  # Options: postgres, dynamo, vector
    table_name: "chat_history"  # Postgres table name for chat history
    summarization_threshold: 20  # Number of messages before summarization
    recent_messages_count: 10  # Number of recent messages to keep when summarizing
  region: "us-east-1"
  knowledge_base_id: ""  # Set your AWS Bedrock Knowledge Base ID here
  model:
    id: "us.anthropic.claude-3-7-sonnet-20250219-v1:0"
    temperature: 0.1
  retrieval:
    number_of_results: 10

api:
  host: "0.0.0.0"
  port: 8000
  timeout: 30




# Logging Configuration
logging:
  version: 1
  disable_existing_loggers: false
  
  formatters:
    standard:
      format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
    detailed:
      format: '%(asctime)s [%(levelname)s] %(name)s:%(lineno)d: %(message)s'
  
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: standard
      stream: ext://sys.stdout
    
    file:
      class: logging.handlers.RotatingFileHandler
      level: DEBUG
      formatter: detailed
      filename: logs/app.log
      maxBytes: 10485760  # 10MB
      backupCount: 5
  
  root:
    level: INFO
    handlers: [console, file]
  
  loggers:
    app:
      level: DEBUG
      handlers: [console, file]
      propagate: false

# Environment-specific overrides
environments:
  development:
    debug: true
    log_level: "DEBUG"
  
  production:
    debug: false
    log_level: "WARNING"
