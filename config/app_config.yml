# Application Configuration
# This file contains configuration settings for the application

app:
  name: "python-template-project"
  version: "1.0.0"
  debug: false
  log_level: "INFO"

database:
  host: "localhost"
  port: 5432
  name: "template_db"
  user: "template_user"
  password: "${DB_PASSWORD}"

api:
  host: "0.0.0.0"
  port: 8000
  timeout: 30

aws:
  region: "${AWS_REGION}"  # Can be overridden via environment variable
  s3_bucket: "template-bucket"
  dynamodb_table: "template-table"

# RAG Application Configuration
rag:
  # Bedrock Knowledge Base ID (set via environment variable or replace in deployment)
  kb_id: "${KB_ID}"
  
  # Bedrock Model ID (e.g., anthropic.claude-3-5-sonnet-20240620-v1:0)
  model_id: "${MODEL_ID}"
  
  # PostgreSQL connection string (set via environment variable or Secrets Manager)
  # Format: postgresql://user:password@host:port/dbname
  pg_dsn: "${PG_DSN}"
  
  # Default number of retrieval results
  default_top_k: "${DEFAULT_TOP_K}"

# Environment-specific overrides
environments:
  development:
    debug: true
    log_level: "DEBUG"
  
  production:
    debug: false
    log_level: "WARNING"


# Logging Configuration
version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
  detailed:
    format: '%(asctime)s [%(levelname)s] %(name)s:%(lineno)d: %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 5

root:
  level: INFO
  handlers: [console, file]

loggers:
  app:
    level: DEBUG
    handlers: [console, file]
    propagate: false
